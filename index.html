<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Pro IA</title>
    <!-- Ícone padrão para navegadores -->
<link rel="icon" href="logo.png" type="image/png">

<!-- Ícone para dispositivos Apple (Web Clip) -->
<link rel="apple-touch-icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="stylechat.css">
</head>
<body>
        <body>

    <div class="app-container">
    
        <header class="chat-header">
            <div class="header-info">
                <div class="avatar">
                    <img src="logo.png" alt="Logo GESTOR IA">
                </div>
                <div class="user-details">
                    <h1>Gestor Pro IA</h1>
                    <span class="status">Online agora</span>
                </div>
            </div>
            
            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn" title="Mudar Tema">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </div>
        </header>

        <main id="chat" class="chat-box">
            <div class="message-wrapper ai-wrapper">
                <div class="message ai-message">
                    <span class="sender-name"> Assistente GPI</span>
                    <p>Olá! Sou sua assistente virtual especialista em Produção industrial.
                        <br> Como posso te ajudar hoje?</p> <br>
                    <span class="time">Agora</span>
                </div>
            </div>
        </main>

        <footer class="input-area">
            <button class="icon-btn"><i class="fa-regular fa-face-smile"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-paperclip"></i></button>
            
            <div class="input-wrapper">
                <input type="text" id="pergunta" placeholder="Me explique sobre produção industrial...">
            </div>
            
            <button id="btn-enviar" class="send-btn" onclick="enviarParaIA()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </footer>
    </div>
        </div>
    </div>
    <script src="Scriptchat.js"></script>
</body>
</html>
